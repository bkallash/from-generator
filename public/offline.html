<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Form Generator</title>
    <!-- Use Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-h: 100vh;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }
        .container {
            max-width: 480px;
            background-color: #171717;
            border: 1px solid #262626;
            padding: 40px 32px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            margin-bottom: 24px;
        }
        .icon svg {
            width: 32px;
            height: 32px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
            letter-spacing: -0.025em;
        }
        p {
            font-size: 14px;
            color: #a3a3a3;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background-color: #ffffff;
            color: #0a0a0a;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            transition: opacity 0.15s ease;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .secondary-text {
            display: block;
            margin-top: 16px;
            font-size: 12px;
            color: #737373;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0L5.636 5.636M8.464 15.536L5.636 18.364m0 0L3 21m4-13a5 5 0 017 0"></path>
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>This form page hasn't been saved on your device yet. Please connect to the internet and visit this form at least once to enable complete offline access.</p>
        <a href="javascript:window.location.reload();" class="btn">Retry Connection</a>
        <span class="secondary-text">Already filled submissions will sync when network is back.</span>
    </div>
</body>
</html>
